name: Orbit CI (self-validation)

# This workflow validates the Orbit framework itself.
# For the full plugin-testing gauntlet, see docs/15-ci-cd.md — that's a
# template you copy into your plugin repo, not something we run here.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate scripts + specs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bash syntax check — all scripts
        run: |
          set -e
          for f in scripts/*.sh .githooks/pre-commit; do
            bash -n "$f" && echo "✓ $f"
          done

      - name: Python syntax check — scripts + skills
        run: |
          set -e
          for f in scripts/*.py; do
            python3 -c "import ast; ast.parse(open('$f').read())" && echo "✓ $f"
          done

      - name: Playwright spec syntax — all flows
        run: |
          set -e
          for f in tests/playwright/flows/*.spec.js tests/playwright/helpers.js tests/playwright/playwright.config.js; do
            node --check "$f" && echo "✓ $f"
          done

      - name: JSON validity — configs + package.json
        run: |
          set -e
          for f in $(find . -name "*.json" -not -path "./node_modules/*" -not -path "./reports/*"); do
            python3 -m json.tool "$f" > /dev/null && echo "✓ $f"
          done

      - name: Dry-run preflight
        run: bash scripts/gauntlet-dry-run.sh || true  # informational

      - name: Zero brand leakage check
        run: |
          # Fail if any brand name leaked into the framework code
          BRAND_LEAKS=$(grep -riE "posimyth|theplusaddons|nexterwp|rankready|uichemy|wdesignkit" \
            scripts/ tests/ docs/ .github/ .githooks/ README.md VISION.md GETTING-STARTED.md AGENTS.md 2>/dev/null | \
            grep -vE "AGENTS.md:.*Plugin brand names.*never.*in.*repo" || true)
          if [ -n "$BRAND_LEAKS" ]; then
            echo "Brand names leaked into framework:"
            echo "$BRAND_LEAKS"
            exit 1
          fi
          echo "✓ No brand leakage — framework stays plugin-agnostic"
